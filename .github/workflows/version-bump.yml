name: Version bump and release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-main:
    name: Bump patch version and publish release
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version and create tag
        run: |
          npm version patch -m "chore(release): v%s"

      - name: Read release version
        id: package-version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Verify release tag was created
        run: test -n "$VERSION" && git rev-parse --verify "refs/tags/v${VERSION}"

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build release artifact
        run: npm run build

      - name: Verify HACS release artifact
        run: |
          test -f hacs.json
          test "$(node -p "require('./hacs.json').filename")" = "computer-control-card.js"
          test -f "dist/$(node -p "require('./hacs.json').filename")"

      - name: Push version bump commit and tag
        run: git push --atomic origin HEAD:main "v${VERSION}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package-version.outputs.version }}
          name: v${{ steps.package-version.outputs.version }}
          make_latest: true
          files: dist/computer-control-card.js
          generate_release_notes: true
          fail_on_unmatched_files: true
