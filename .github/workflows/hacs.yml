name: HACS validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hacs:
    name: Validate HACS plugin metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify HACS metadata and built artifact path
        run: |
          test -f hacs.json
          test "$(node -p "require('./hacs.json').filename")" = "dist/computer-control-card.js"
          test -f dist/computer-control-card.js

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: plugin
