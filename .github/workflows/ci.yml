name: Build and test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Build, test, and verify artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify built card artifact
        run: test -f dist/computer-control-card.js

      - name: Unit tests
        run: npm test

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Upload Playwright test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-artifacts
          path: |
            test-results/
            artifacts/playwright-report/
            artifacts/screenshots/
          if-no-files-found: ignore
          retention-days: 14
